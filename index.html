<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Are You Besties with AI?</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f7ff;min-height:100vh;padding:1rem}
#quiz{max-width:680px;margin:0 auto;background:white;border-radius:16px;padding:2rem;box-shadow:0 2px 16px rgba(24,95,165,0.08)}
.screen{display:none}
.screen.active{display:block}
.intro-title{font-size:2rem;font-weight:600;color:#185FA5;line-height:1.2;text-align:center;margin-bottom:0.4rem}
.intro-sub{font-size:1.2rem;color:#378ADD;text-align:center;margin-bottom:2rem;font-weight:400}
.progress-bar{height:6px;background:#e0eaf5;border-radius:4px;margin-bottom:1.5rem;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#1D9E75,#185FA5);border-radius:4px;transition:width 0.4s ease}
.q-label{font-size:12px;color:#888;margin-bottom:0.4rem;font-weight:600;letter-spacing:0.05em;text-transform:uppercase}
.q-text{font-size:1.1rem;font-weight:600;color:#1a1a1a;margin-bottom:0.25rem;line-height:1.4}
.q-desc{font-size:0.9rem;color:#666;margin-bottom:1.2rem;line-height:1.5}
.options{display:flex;flex-direction:column;gap:0.6rem;margin-bottom:1.2rem}
.opt-btn{padding:0.75rem 1rem;border:1px solid #ccd9e8;border-radius:12px;background:white;color:#1a1a1a;font-size:0.95rem;cursor:pointer;text-align:left;transition:all 0.15s;line-height:1.4}
.opt-btn:hover{border-color:#378ADD;background:#E6F1FB;color:#0C447C}
.opt-btn.selected{border-color:#185FA5;background:#E6F1FB;color:#0C447C;font-weight:500}
.multi-opt{padding:0.75rem 1rem;border:1px solid #ccd9e8;border-radius:12px;background:white;color:#1a1a1a;font-size:0.95rem;cursor:pointer;text-align:left;transition:all 0.15s;line-height:1.4;display:flex;align-items:center;gap:0.6rem;width:100%}
.multi-opt:hover{border-color:#1D9E75;background:#E1F5EE;color:#085041}
.multi-opt.selected{border-color:#1D9E75;background:#E1F5EE;color:#085041;font-weight:500}
.check-box{width:18px;height:18px;border:1.5px solid #ccc;border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px}
.multi-opt.selected .check-box{background:#1D9E75;border-color:#1D9E75;color:white}
.nav-row{display:flex;gap:0.75rem;align-items:center}
.btn-next{padding:0.65rem 1.6rem;background:#185FA5;color:white;border:none;border-radius:8px;font-size:0.95rem;font-weight:500;cursor:pointer;transition:background 0.15s}
.btn-next:hover{background:#0C447C}
.btn-next:disabled{background:#ccc;cursor:not-allowed}
.btn-back{padding:0.65rem 1.2rem;background:transparent;color:#666;border:1px solid #ccd9e8;border-radius:8px;font-size:0.95rem;cursor:pointer;transition:all 0.15s}
.btn-back:hover{border-color:#378ADD;color:#185FA5}
.img-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin-bottom:1.2rem}
.img-opt{border:2px solid transparent;border-radius:10px;overflow:hidden;cursor:pointer;transition:all 0.15s}
.img-opt img{width:100%;height:140px;object-fit:cover;display:block}
.img-opt:hover{border-color:#378ADD}
.img-opt.selected{border-color:#185FA5}
.img-opt .img-label{font-size:0.78rem;padding:0.3rem 0.5rem;background:#f5f5f5;color:#555;text-align:center;line-height:1.3}
.result-header{text-align:center;margin-bottom:1.5rem}
.result-badge{display:inline-block;padding:0.4rem 1.2rem;border-radius:20px;font-size:0.85rem;font-weight:600;margin-bottom:0.75rem}
.result-title{font-size:1.8rem;font-weight:600;margin-bottom:0.5rem;color:#1a1a1a}
.result-sub{font-size:0.95rem;color:#555;line-height:1.6;max-width:520px;margin:0 auto 1.5rem}
.plot-container{background:#f0f7ff;border-radius:12px;padding:1rem;margin-bottom:1.5rem}
.plot-title{font-size:0.8rem;color:#666;text-align:center;margin-bottom:0.5rem}
#plot-canvas{display:block;margin:0 auto}
.prediction-row{display:flex;align-items:flex-start;gap:0.6rem;font-size:0.9rem;padding:0.75rem;background:#f5f5f5;border-radius:8px;margin-bottom:1.2rem;line-height:1.5}
.pct-stat{text-align:center;font-size:0.95rem;color:#555;margin-bottom:1.2rem;padding:0.75rem;background:#E6F1FB;border-radius:8px}
.pct-stat span{font-weight:600;color:#185FA5}
.reflection-card{border:1px solid #e0eaf5;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1rem;background:white}
.reflection-card h3{font-size:1rem;font-weight:600;color:#185FA5;margin-bottom:0.5rem}
.reflection-card p{font-size:0.9rem;line-height:1.6;color:#555;margin-bottom:0.5rem}
.reflection-card ul{padding-left:1.2rem;font-size:0.88rem;line-height:1.8;color:#555}
.reflection-card a{color:#185FA5;text-decoration:none}
.reflection-card a:hover{text-decoration:underline}
.divider{height:1px;background:#e0eaf5;margin:1.2rem 0}
.restart-btn{display:block;width:100%;padding:0.75rem;background:#185FA5;color:white;border:none;border-radius:10px;font-size:1rem;font-weight:500;cursor:pointer;text-align:center;transition:background 0.15s}
.restart-btn:hover{background:#0C447C}
.start-btn{display:block;width:100%;max-width:300px;margin:0 auto;padding:0.9rem;background:linear-gradient(135deg,#185FA5,#1D9E75);color:white;border:none;border-radius:12px;font-size:1.05rem;font-weight:500;cursor:pointer;text-align:center;transition:opacity 0.15s}
.start-btn:hover{opacity:0.88}
.ai-banner{background:linear-gradient(135deg,#E6F1FB,#E1F5EE);border-radius:12px;padding:1.5rem;text-align:center;margin-bottom:1.5rem}
.ai-banner .emoji-row{font-size:2rem;margin-bottom:0.5rem}
.intro-body{font-size:0.95rem;color:#555;line-height:1.7;margin-bottom:1.5rem;text-align:center}
@media(max-width:500px){
  #quiz{padding:1.2rem}
  .intro-title{font-size:1.5rem}
  .img-grid{grid-template-columns:1fr 1fr}
  .img-opt img{height:110px}
}
</style>
</head>

      {text:"💎 Gemini",lv:1,ex:0},

  },
  {

    desc:"Select all that apply!",

    options:[

      {text:"⚡ Work tasks, I'm a productivity queen/king",lv:1,ex:2},

let currentQ=0,answers=[],selectedIndices=[],lvScore=0,exScore=0;

function startQuiz(){
  document.getElementById('screen-intro').classList.remove('active');
  document.getElementById('screen-quiz').classList.add('active');
  renderQuestion();
}

function renderQuestion(){
  const q=questions[currentQ];
  document.getElementById('q-label').textContent=q.label;
  document.getElementById('q-text').textContent=q.text;
  document.getElementById('q-desc').textContent=q.desc||'';
  document.getElementById('progress-fill').style.width=((currentQ/questions.length)*100)+'%';
  document.getElementById('btn-back').style.visibility=currentQ===0?'hidden':'visible';
  document.getElementById('btn-next').disabled=true;
  selectedIndices=answers[currentQ]?[...answers[currentQ]]:[];
  const container=document.getElementById('options-container');
  container.innerHTML='';

  if(q.type==='image'){
    const grid=document.createElement('div');
    grid.className='img-grid';
    q.options.forEach((opt,i)=>{
      const div=document.createElement('div');
      div.className='img-opt'+(selectedIndices.includes(i)?' selected':'');
      div.innerHTML=`<img src="${opt.imgSrc}" alt="Option ${i+1}"><div class="img-label">${opt.text}</div>`;
      div.onclick=()=>{
        selectedIndices=[i];
        document.querySelectorAll('.img-opt').forEach((el,j)=>el.classList.toggle('selected',j===i));
        document.getElementById('btn-next').disabled=false;
      };
      grid.appendChild(div);
    });
    container.appendChild(grid);
  } else if(q.type==='multi'){
    q.options.forEach((opt,i)=>{
      const btn=document.createElement('button');
      btn.className='multi-opt'+(selectedIndices.includes(i)?' selected':'');
      btn.innerHTML=`<div class="check-box">${selectedIndices.includes(i)?'✓':''}</div><span>${opt.text}</span>`;
      btn.onclick=()=>{
        if(selectedIndices.includes(i)){selectedIndices=selectedIndices.filter(x=>x!==i);}
        else{selectedIndices.push(i);}
        document.querySelectorAll('.multi-opt').forEach((el,j)=>{
          el.classList.toggle('selected',selectedIndices.includes(j));
          el.querySelector('.check-box').textContent=selectedIndices.includes(j)?'✓':'';
        });
        document.getElementById('btn-next').disabled=selectedIndices.length===0;
      };
      container.appendChild(btn);
    });
    if(selectedIndices.length>0) document.getElementById('btn-next').disabled=false;
  } else {
    q.options.forEach((opt,i)=>{
      const btn=document.createElement('button');
      btn.className='opt-btn'+(selectedIndices.includes(i)?' selected':'');
      btn.textContent=opt.text;
      btn.onclick=()=>{
        selectedIndices=[i];
        document.querySelectorAll('.opt-btn').forEach((el,j)=>el.classList.toggle('selected',j===i));
        document.getElementById('btn-next').disabled=false;
      };
      container.appendChild(btn);
    });
    if(selectedIndices.length>0) document.getElementById('btn-next').disabled=false;
  }
}

function goNext(){
  answers[currentQ]=[...selectedIndices];
  currentQ++;
  if(currentQ>=questions.length){calcResults();}
  else{renderQuestion();}
}

function goBack(){
  if(currentQ>0){currentQ--;renderQuestion();}
}

function calcResults(){
  lvScore=0;exScore=0;
  for(let qi=1;qi<questions.length;qi++){
    const q=questions[qi];
    const sel=answers[qi]||[];
    sel.forEach(i=>{lvScore+=q.options[i].lv;exScore+=q.options[i].ex;});
  }
  const isLover=lvScore>=0;
  const isExpert=exScore>=0;
  const resultTag=(isLover?'lover':'hater')+'_'+(isExpert?'expert':'novice');
  const prediction=questions[0].options[answers[0]?.[0]]?.tag||'';
  const predictedCorrectly=prediction===resultTag;
  if(predictedCorrectly) correctPredictions++;
  const pct=Math.round((correctPredictions/(TOTAL_TAKERS+1))*100);
  showResult(isLover,isExpert,resultTag,predictedCorrectly,pct);
}

function showResult(isLover,isExpert,tag,predictedCorrectly,pct){
  document.getElementById('screen-quiz').classList.remove('active');
  document.getElementById('screen-result').classList.add('active');
  const titles={
    lover_expert:{badge:"💖 Lover Expert",color:"#185FA5",bg:"#E6F1FB",title:"A Lover Expert"},
    lover_novice:{badge:"😍 Lover Novice",color:"#1D9E75",bg:"#E1F5EE",title:"A Lover Novice"},
    hater_expert:{badge:"😤 Hater Expert",color:"#993C1D",bg:"#FAECE7",title:"A Hater Expert"},
    hater_novice:{badge:"🙅 Hater Novice",color:"#884F0B",bg:"#FAEEDA",title:"A Hater Novice"}
  };
  const t=titles[tag];
  const badge=document.getElementById('result-badge');
  badge.textContent=t.badge;
  badge.style.background=t.bg;
  badge.style.color=t.color;
  document.getElementById('result-title').textContent="You are: "+t.title;
  document.getElementById('result-sub').textContent="You "+(isLover?"love":"have reservations about")+" AI and you "+(isExpert?"know quite a lot about it":"are still building your knowledge")+". See where you landed on the spectrum below.";
  document.getElementById('pct-stat').innerHTML=`<span>${pct}%</span> of all quiz takers predicted their results correctly.`;
  const predRow=document.getElementById('prediction-row');
  predRow.innerHTML=predictedCorrectly
    ?`<span style="font-size:20px">🎯</span> <span>You predicted your result correctly — nice self-awareness!</span>`
    :`<span style="font-size:20px">😲</span> <span>You predicted <strong>${(questions[0].options[answers[0]?.[0]]?.text||'').replace(/[🧠😊😤🙅] /,'')}</strong>, but landed as <strong>${t.title}</strong>. Surprised?</span>`;
  drawPlot(lvScore,exScore);
  renderReflection(tag);
  window.scrollTo({top:0,behavior:'smooth'});
}

function drawPlot(lv,ex){
  const canvas=document.getElementById('plot-canvas');
  const ctx=canvas.getContext('2d');
  const W=320,H=280;
  ctx.clearRect(0,0,W,H);
  const pad=50;
  const cw=W-pad*2,ch=H-pad*2;
  ctx.fillStyle='#f0f7ff';
  ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='#B5D4F4';
  ctx.lineWidth=1;
  ctx.strokeRect(pad,pad,cw,ch);
  ctx.strokeStyle='#c8d8ec';
  ctx.lineWidth=0.5;
  ctx.setLineDash([4,4]);
  ctx.beginPath();
  ctx.moveTo(pad+cw/2,pad);ctx.lineTo(pad+cw/2,pad+ch);
  ctx.moveTo(pad,pad+ch/2);ctx.lineTo(pad+cw,pad+ch/2);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle='#185FA5';
  ctx.font='bold 11px -apple-system,sans-serif';
  ctx.textAlign='center';
  ctx.fillText('Expert',pad+cw/2,pad-8);
  ctx.fillText('Novice',pad+cw/2,pad+ch+18);
  ctx.fillStyle='#993C1D';
  ctx.textAlign='left';
  ctx.fillText('Hater',pad+2,pad+ch/2+4);
  ctx.fillStyle='#0C447C';
  ctx.textAlign='right';
  ctx.fillText('Lover',pad+cw-2,pad+ch/2+4);
  const maxLv=25,maxEx=15;
  const nx=pad+(lv/maxLv*cw/2)+cw/2;
  const ny=pad+(-ex/maxEx*ch/2)+ch/2;
  const cx2=Math.max(pad+12,Math.min(pad+cw-12,nx));
  const cy2=Math.max(pad+12,Math.min(pad+ch-12,ny));
  ctx.beginPath();
  ctx.arc(cx2,cy2,12,0,Math.PI*2);
  ctx.fillStyle='#185FA5';
  ctx.fill();
  ctx.strokeStyle='#0C447C';
  ctx.lineWidth=2;
  ctx.stroke();
  ctx.fillStyle='white';
  ctx.font='bold 10px -apple-system,sans-serif';
  ctx.textAlign='center';
  ctx.fillText('YOU',cx2,cy2+4);
}
